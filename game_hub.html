<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>严肃游戏关卡选择 - 真医美</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.3.4.3.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>
<style>
        body { background-color: #f1f5f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: -apple-system, sans-serif; }
        .mobile-container { width: 375px; height: 812px; background: #FFF; border: 8px solid #333; border-radius: 40px; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .game-card { border-radius: 24px; position: relative; overflow: hidden; transition: transform 0.3s; }
        .game-card:active { transform: scale(0.98); }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .status-badge { position: absolute; top: 12px; right: 12px; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>
<div class="mobile-container">
<!-- Header -->
<div class="mt-10 px-6 py-4">
<a class="inline-flex items-center text-gray-400 mb-4" href="index.html">
<iconify-icon icon="mdi:arrow-left" width="24"></iconify-icon>
<span class="ml-1 text-sm">返回</span>
</a>
<h1 class="text-2xl font-bold text-gray-800">不着急，玩个游戏再进门</h1>
<p class="text-gray-400 text-sm mt-1">识破套路，守护美丽与钱包</p>
</div>
<!-- Levels List -->
<div class="flex-1 overflow-y-auto px-6 pb-10 space-y-6">
<!-- Level 1 -->
<div class="space-y-3">
<div class="flex items-center justify-between">
<h2 class="text-lg font-bold text-gray-700">认知启蒙篇</h2>
<span class="text-xs text-rose-500 font-semibold">必修课</span>
</div>
<a class="block game-card bg-rose-50 p-5 border border-rose-100" href="game_play.html?mode=match">
<div class="flex items-center gap-4">
<div class="w-12 h-12 bg-rose-500 rounded-2xl flex items-center justify-center text-white">
<iconify-icon icon="mdi:magnify-scan" width="28"></iconify-icon>
</div>
<div>
<h3 class="font-bold text-gray-800 text-sm">医美诈骗“真面目”</h3>
<p class="text-[10px] text-gray-400 mt-1">小游戏：真假医美大区分 / 诈骗套路快记牢</p>
</div>
</div>
<div class="mt-4 flex gap-2">
<span class="px-2 py-0.5 bg-rose-200 text-rose-700 text-[9px] rounded-md uppercase font-bold">难度: 易</span>
<span class="px-2 py-0.5 bg-green-200 text-green-700 text-[9px] rounded-md uppercase font-bold">已通过</span>
</div>
</a>
</div>
<!-- Level 2 -->
<div class="space-y-3">
<h2 class="text-lg font-bold text-gray-700">角色扮演篇</h2>
<a class="block game-card bg-indigo-50 p-5 border border-indigo-100" href="game_play.html?mode=roleplay">
<div class="flex items-center gap-4">
<div class="w-12 h-12 bg-indigo-500 rounded-2xl flex items-center justify-center text-white">
<iconify-icon icon="mdi:account-voice" width="28"></iconify-icon>
</div>
<div>
<h3 class="font-bold text-gray-800 text-sm">拒绝医美陷阱，我能行</h3>
<p class="text-[10px] text-gray-400 mt-1">小游戏：门店游说应对战 / 熟人介绍辨真假</p>
</div>
</div>
<div class="mt-4 flex gap-2">
<span class="px-2 py-0.5 bg-indigo-200 text-indigo-700 text-[9px] rounded-md uppercase font-bold">难度: 中</span>
<span class="px-2 py-0.5 bg-amber-200 text-amber-700 text-[9px] rounded-md uppercase font-bold">解锁中</span>
</div>
</a>
</div>
<!-- Level 3 -->
<div class="space-y-3">
<h2 class="text-lg font-bold text-gray-700">技巧巩固篇</h2>
<div class="game-card bg-gray-50 p-5 border border-gray-100 opacity-60">
<div class="flex items-center gap-4">
<div class="w-12 h-12 bg-gray-400 rounded-2xl flex items-center justify-center text-white">
<iconify-icon icon="mdi:trophy-variant" width="28"></iconify-icon>
</div>
<div>
<h3 class="font-bold text-gray-800 text-sm">防骗技巧大闯关</h3>
<p class="text-[10px] text-gray-400 mt-1">综合考核：您的专属医美顾问终极挑战</p>
</div>
</div>
<div class="mt-4">
<span class="px-2 py-0.5 bg-gray-200 text-gray-500 text-[9px] rounded-md uppercase font-bold">需完成前置关卡</span>
</div>
<div class="absolute right-4 top-1/2 -translate-y-1/2">
<iconify-icon class="text-gray-300" icon="mdi:lock" width="24"></iconify-icon>
</div>
</div>
</div>
</div>
<!-- Bottom Footer -->
<div class="p-6 text-center border-t border-gray-50 bg-gray-50/50">
<div class="flex items-center justify-center gap-2 mb-2">
<div class="w-2 h-2 bg-green-500 rounded-full"></div>
<span class="text-[10px] text-gray-400">目前已有 1,28,492 位求美者参与通关</span>
</div>
<p class="text-[10px] text-gray-300">真医美 · 严肃游戏实验室 © 2026</p>
</div>
</div>
</body>
</html>
