<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>真医美 - 智能医美顾问与防骗游戏</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.3.4.3.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>
<style>
        body { background-color: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .mobile-container { width: 375px; height: 812px; background: white; border: 8px solid #333; border-radius: 40px; position: relative; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
        .status-bar { height: 44px; padding: 0 24px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; font-weight: 600; }
        .app-gradient { background: linear-gradient(135deg, #FF9A9E 0%, #FAD0C4 99%, #FAD0C4 100%); }
        .glass-effect { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body>
<div class="mobile-container">
<!-- 状态栏 -->
<div class="status-bar">
<span>09:41</span>
<div class="flex gap-1.5">
<iconify-icon icon="mdi:signal" width="18"></iconify-icon>
<iconify-icon icon="mdi:wifi" width="18"></iconify-icon>
<iconify-icon icon="mdi:battery" width="18"></iconify-icon>
</div>
</div>
<!-- 登录页内容 -->
<div class="h-full flex flex-col p-8 pt-12">
<div class="flex-1 flex flex-col items-center justify-center text-center">
<div class="w-24 h-24 bg-rose-100 rounded-3xl flex items-center justify-center mb-6 shadow-sm">
<iconify-icon class="text-rose-500" icon="mdi:face-woman-shimmer" width="60"></iconify-icon>
</div>
<h1 class="text-3xl font-bold text-gray-800 mb-2">真医美</h1>
<p class="text-gray-500 mb-12">您的专属智能医美避坑顾问</p>
<div class="w-full space-y-4">
<div class="relative">
<iconify-icon class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400" icon="mdi:cellphone" width="20"></iconify-icon>
<input class="w-full pl-12 pr-4 py-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-rose-300 transition-all outline-none text-sm" placeholder="请输入手机号" type="text" value="138****2026"/>
</div>
<div class="relative">
<iconify-icon class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400" icon="mdi:shield-check" width="20"></iconify-icon>
<input class="w-full pl-12 pr-4 py-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-rose-300 transition-all outline-none text-sm" placeholder="请输入验证码" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-rose-500 text-xs font-semibold">获取验证码</button>
</div>
</div>
<div class="mt-8 w-full">
<a class="block w-full py-4 app-gradient text-white font-bold rounded-2xl shadow-lg shadow-rose-200 active:scale-95 transition-transform text-center" href="game_hub.html">
                        开始严肃游戏 · 避坑闯关
                    </a>
<a class="block w-full py-4 mt-4 border-2 border-rose-100 text-rose-500 font-bold rounded-2xl hover:bg-rose-50 transition-colors text-center" href="ai_chat.html">
                        进入 AI 医美顾问对话
                    </a>
</div>
<div class="mt-8 flex items-start gap-2 text-left">
<input class="mt-1 rounded text-rose-500 focus:ring-rose-500" id="agree" type="checkbox"/>
<label class="text-xs text-gray-400 leading-tight" for="agree">
                        我已阅读并同意 <span class="text-rose-400">《用户协议》</span> <span class="text-rose-400">《隐私政策》</span> 及相关授权条款。
                    </label>
</div>
</div>
<!-- 底部装饰 -->
<div class="pb-4 text-center">
<p class="text-[10px] text-gray-300 tracking-widest uppercase">Version 2.0.26 - Since 2025</p>
<div class="mt-2 w-32 h-1 bg-gray-200 mx-auto rounded-full"></div>
</div>
</div>
</div>
</body>
</html>
